name: CodeQL

# Static application security testing (SAST) for the C# codebase. Runs on every pull request and on
# pushes to the default branch, plus a weekly schedule so the code is re-scanned against updated
# CodeQL queries even when nothing has changed. Findings surface in the Security > Code scanning tab
# and as PR annotations. This is advisory: it is deliberately NOT wired up as a required status check,
# so a finding informs review but does not block merge. Promote it to required in branch protection
# later if desired. The green-merge gate lives in ci.yml.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Mondays at 07:00 UTC — a weekly re-scan independent of code changes.
    - cron: '0 7 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (C#)
    # Buildless analysis (build-mode: none) needs no compiler/toolchain, so it runs on Linux — no
    # Windows runner or WinUI toolchain required (unlike ci.yml, which must build).
    runs-on: ubuntu-latest

    permissions:
      # CodeQL needs to upload its SARIF results to the code-scanning API.
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: csharp
          # Buildless C# extraction (analyse source directly, no compile). Two reasons over a manual
          # build: (1) it sidesteps the WinUI x64-only platform that defeats CodeQL autobuild, so no
          # dotnet build/restore steps are needed; (2) crucially, paths/paths-ignore filters ONLY
          # apply to compiled languages in build-mode: none — with a build, the generated obj/*.g.cs
          # files are compiled and analysed and cannot be excluded by config. build-mode: none means
          # those files are never generated, and the config-file exclusions actually take effect.
          # (Tradeoff: buildless analysis can have slightly lower data-flow fidelity than a built
          # analysis. This mirrors microsoft/win-dev-skills, a WinUI repo on the same setup.)
          build-mode: none
          # Query suite and path exclusions live in the config file (single place for CodeQL tuning).
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: /language:csharp
