name: amplify-codeql

# Exclude build output from analysis. The XAML compiler emits generated C# (e.g.
# XamlTypeInfo.g.cs, MainPage.g.cs) into obj/ during the manual x64 build; those files are not our
# source and produced ~90% of the alerts as false positives. For compiled languages CodeQL filters
# reported alerts by source path, so excluding obj/ (which sits under the repo root) drops those
# alerts and auto-closes the existing ones on the next run.
paths-ignore:
  - '**/obj/**'
  - '**/bin/**'

# Query suite lives here (moved from the workflow's inline `queries:`) to keep all CodeQL tuning in
# one place. security-and-quality adds maintainability/quality queries on top of the security set;
# drop to 'security-extended' or the default suite if the noise is too high.
queries:
  - uses: security-and-quality
