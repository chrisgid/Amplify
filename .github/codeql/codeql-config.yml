name: amplify-codeql

# Exclude build output. The primary reason the generated XAML C# (XamlTypeInfo.g.cs, MainPage.g.cs,
# etc.) no longer pollutes results is that the workflow runs build-mode: none (buildless) — with no
# build, obj/ is never populated, so those files are never analysed. These filters are defensive
# belt-and-braces for any generated/build files that do land in the checkout. NOTE: paths/paths-ignore
# only affect compiled languages when build-mode is none; under a real build they are ignored for C#.
paths-ignore:
  - '**/obj/**'
  - '**/bin/**'

# Query suite lives here (single place for CodeQL tuning). security-extended is security-focused:
# the default security queries plus lower-severity/precision security ones. We deliberately do NOT
# use security-and-quality — its maintainability queries produced 53 non-security alerts (all
# security_severity_level: none), dominated by cs/unmanaged-code + cs/call-to-unmanaged-code (the
# app's global-keyboard-hook P/Invoke, inherent and unavoidable) and cs/path-combine. As a SAST
# gate we want genuine security findings, not style noise. Bump back to security-and-quality if you
# want the maintainability queries too.
queries:
  - uses: security-extended
