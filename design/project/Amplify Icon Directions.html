<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Amplify — Icon Directions</title>
<style>
  :root { --font: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--font); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const TILE = 0.235; // corner radius factor for app-tile squircles

function Grad({ id }) {
  return (
    <defs>
      <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="#3aa0ff" />
        <stop offset="1" stopColor="#0061cf" />
      </linearGradient>
    </defs>
  );
}

// ---- CURRENT (flagged): circle + speaker + concentric waves ----
function IconCurrent({ s = 96 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 96 96" style={{ display: "block" }}>
      <Grad id="gCur" />
      <circle cx="48" cy="48" r="46" fill="url(#gCur)" />
      <path d="M30 40h8l10-9v34l-10-9h-8a3 3 0 01-3-3v-10a3 3 0 013-3z" fill="#fff" />
      <path d="M56 39a13 13 0 010 18M63 32a23 23 0 010 32" fill="none" stroke="#fff" strokeWidth="4.8" strokeLinecap="round" />
    </svg>
  );
}

// ---- A · Amplitude : squircle tile + rising level bars ----
function IconAmplitude({ s = 96 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 96 96" style={{ display: "block" }}>
      <Grad id="gAmp" />
      <rect x="2" y="2" width="92" height="92" rx={96 * TILE} fill="url(#gAmp)" />
      <g fill="#fff">
        <rect x="25" y="55" width="9.5" height="18" rx="4.75" />
        <rect x="38.5" y="45" width="9.5" height="28" rx="4.75" />
        <rect x="52" y="33" width="9.5" height="40" rx="4.75" />
        <rect x="65.5" y="22" width="9.5" height="51" rx="4.75" />
      </g>
    </svg>
  );
}

// ---- B · Boost : circle (kept) + speaker + up arrow ----
function IconBoost({ s = 96 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 96 96" style={{ display: "block" }}>
      <Grad id="gBoost" />
      <circle cx="48" cy="48" r="46" fill="url(#gBoost)" />
      <path d="M28 40h8l11-9v34l-11-9h-8a3 3 0 01-3-3v-10a3 3 0 013-3z" fill="#fff" />
      <path d="M62 56V37m0 0l-8 8m8-8l8 8" fill="none" stroke="#fff" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ---- C · Keycap : the volume-up key (ties to the hotkey concept) ----
function IconKeycap({ s = 96 }) {
  return (
    <svg width={s} height={s} viewBox="0 0 96 96" style={{ display: "block" }}>
      <Grad id="gKey" />
      <rect x="2" y="2" width="92" height="92" rx={96 * TILE} fill="url(#gKey)" />
      <rect x="25" y="24" width="46" height="46" rx="12" fill="#fff" opacity="0.18" />
      <rect x="25" y="23" width="46" height="42" rx="12" fill="#fff" />
      <path d="M48 38v15m0-15l-8.5 8.5M48 38l8.5 8.5" fill="none" stroke="#0061cf" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

const { DesignCanvas, DCSection, DCArtboard } = window;

const card = { width: "100%", height: "100%", background: "#fff", borderRadius: 10, border: "1px solid rgba(0,0,0,.08)", padding: 18, display: "flex", flexDirection: "column", gap: 14, fontFamily: "var(--font)" };
const tileWrap = { display: "flex", justifyContent: "center", alignItems: "center", padding: "8px 0 4px" };
const sizeRow = { display: "flex", alignItems: "center", gap: 12, justifyContent: "center", color: "rgba(0,0,0,.45)", fontSize: 11 };
const tbar = { display: "flex", alignItems: "center", gap: 8, background: "#f3f3f3", border: "1px solid rgba(0,0,0,.07)", borderRadius: 7, padding: "7px 10px", color: "rgba(0,0,0,.85)", fontSize: 12 };
const tbarDark = { ...tbar, background: "#202020", border: "1px solid rgba(255,255,255,.08)", color: "rgba(255,255,255,.9)" };
const titleS = { fontSize: 14, fontWeight: 600, color: "rgba(0,0,0,.9)" };
const descS = { fontSize: 12, lineHeight: "17px", color: "rgba(0,0,0,.6)" };
const safe = { fontSize: 11.5, fontWeight: 600, color: "#0f7b0f", display: "flex", alignItems: "center", gap: 6, marginTop: 8 };
const flag = { ...safe, color: "#c42b1c" };

function Frame({ Icon, title, desc, note, flagged }) {
  return (
    <div style={card}>
      <div style={tileWrap}><Icon s={104} /></div>
      <div style={sizeRow}>
        <Icon s={36} /><Icon s={24} /><Icon s={16} />
        <span>· title-bar &amp; tray sizes</span>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <div style={{ ...tbar, flex: 1 }}><Icon s={16} /> Amplify</div>
        <div style={{ ...tbarDark, flex: 1 }}><Icon s={16} /> Amplify</div>
      </div>
      <div style={{ marginTop: "auto" }}>
        <div style={titleS}>{title}</div>
        <div style={descS}>{desc}</div>
        <div style={flagged ? flag : safe}>{flagged ? "✕ " : "✓ "}{note}</div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="icons" title="Amplify icon directions"
        subtitle="Spotify flags &ldquo;the circle, and the waves&rdquo; as protected brand elements. Three safer directions, plus the current mark for comparison.">
        <DCArtboard id="cur" label="Current · flagged" width={300} height={392}>
          <Frame Icon={IconCurrent} flagged title="Current — speaker + waves in a circle"
            desc="A circle containing concentric sound waves. Blue (not green) helps, but it touches two of the three named elements."
            note="Circle + curved waves — closest to Spotify's motif" />
        </DCArtboard>
        <DCArtboard id="a" label="A · Amplitude" width={300} height={392}>
          <Frame Icon={IconAmplitude} title="Amplitude — rising level bars"
            desc="A crescendo of bars in a Fluent app tile. Reads as &lsquo;boost / amplify&rsquo; and feels native to Windows 11 icons."
            note="No circle, no curved waves — furthest from Spotify" />
        </DCArtboard>
        <DCArtboard id="b" label="B · Boost" width={300} height={392}>
          <Frame Icon={IconBoost} title="Boost — speaker + up arrow"
            desc="Keeps the round badge you liked, but swaps the concentric waves for a clear volume-up arrow."
            note="Round badge kept; the risky curved waves are gone" />
        </DCArtboard>
        <DCArtboard id="c" label="C · Keycap" width={300} height={392}>
          <Frame Icon={IconKeycap} title="Keycap — the volume-up key"
            desc="Leans into what Amplify actually is: a keyboard shortcut. A keycap bearing an up arrow."
            note="No audio motif at all — conceptually distinct" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
