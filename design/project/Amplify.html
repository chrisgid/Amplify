<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Amplify — Spotify volume hotkeys</title>
<style>
  :root {
    --font: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
    --font-display: "Segoe UI Variable Display", "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ============ DESKTOP / WALLPAPER ============ */
  #desktop {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    overflow: hidden;
    transition: background .4s ease;
  }
  #desktop[data-wp="light"] {
    background:
      radial-gradient(120% 90% at 12% 8%, #eaf2ff 0%, rgba(234,242,255,0) 55%),
      radial-gradient(120% 100% at 88% 18%, #f6ecff 0%, rgba(246,236,255,0) 50%),
      radial-gradient(140% 120% at 70% 95%, #d7f0ff 0%, rgba(215,240,255,0) 55%),
      linear-gradient(135deg, #5b7cc4 0%, #6a8fd0 38%, #8a7bc0 70%, #b08fc9 100%);
  }
  #desktop[data-wp="dark"] {
    background:
      radial-gradient(120% 90% at 12% 8%, #1b2740 0%, rgba(27,39,64,0) 55%),
      radial-gradient(120% 100% at 88% 18%, #2a1f44 0%, rgba(42,31,68,0) 50%),
      radial-gradient(140% 120% at 70% 95%, #102a3a 0%, rgba(16,42,58,0) 55%),
      linear-gradient(135deg, #11203a 0%, #14182e 45%, #211731 75%, #2a1d33 100%);
  }
  /* faint flowing "bloom" ribbons */
  #desktop::before {
    content: ""; position: absolute; inset: -10%;
    background:
      radial-gradient(40% 30% at 30% 40%, rgba(255,255,255,.10), transparent 70%),
      radial-gradient(35% 50% at 75% 60%, rgba(255,255,255,.08), transparent 70%);
    filter: blur(20px);
    pointer-events: none;
  }

  /* ============ THEME TOKENS ============ */
  .amp-root {
    --radius-sm: 4px;
    --radius: 7px;
    --radius-lg: 8px;
    --shadow-flyout: 0 8px 16px rgba(0,0,0,.14), 0 0 1px rgba(0,0,0,.20);
    --shadow-dialog: 0 32px 64px rgba(0,0,0,.28), 0 0 2px rgba(0,0,0,.22);
    --ease: cubic-bezier(.16,1,.3,1);
  }
  .amp-root[data-theme="light"] {
    --mica: rgba(244,244,245,.86);
    --mica-titlebar: rgba(243,243,243,.5);
    --text-1: rgba(0,0,0,.896);
    --text-2: rgba(0,0,0,.606);
    --text-3: rgba(0,0,0,.447);
    --text-disabled: rgba(0,0,0,.36);
    --card: rgba(255,255,255,.70);
    --card-2: rgba(252,252,252,.55);
    --card-stroke: rgba(0,0,0,.058);
    --control: rgba(255,255,255,.70);
    --control-hover: rgba(249,249,249,.70);
    --control-pressed: rgba(249,249,249,.45);
    --control-stroke: rgba(0,0,0,.068);
    --control-stroke-bottom: rgba(0,0,0,.16);
    --divider: rgba(0,0,0,.07);
    --subtle-hover: rgba(0,0,0,.037);
    --subtle-pressed: rgba(0,0,0,.024);
    --keycap-bg: rgba(255,255,255,.85);
    --keycap-stroke: rgba(0,0,0,.14);
    --keycap-shadow: 0 1px 0 rgba(0,0,0,.10);
    --smoke: rgba(255,255,255,.40);
    --track: rgba(0,0,0,.45);
    --success: #0f7b0f; --success-bg: rgba(223,246,221,.7); --success-stroke: rgba(15,123,15,.25);
    --warning: #9d5d00; --warning-bg: rgba(255,244,206,.7); --warning-stroke: rgba(157,93,0,.22);
    --error: #c42b1c;   --error-bg: rgba(253,231,233,.8);   --error-stroke: rgba(196,43,28,.22);
    --info-bg: rgba(255,255,255,.6); --info-stroke: rgba(0,0,0,.06);
  }
  .amp-root[data-theme="dark"] {
    --mica: rgba(32,32,33,.88);
    --mica-titlebar: rgba(28,28,28,.5);
    --text-1: rgba(255,255,255,1);
    --text-2: rgba(255,255,255,.786);
    --text-3: rgba(255,255,255,.544);
    --text-disabled: rgba(255,255,255,.36);
    --card: rgba(255,255,255,.052);
    --card-2: rgba(255,255,255,.034);
    --card-stroke: rgba(255,255,255,.070);
    --control: rgba(255,255,255,.061);
    --control-hover: rgba(255,255,255,.084);
    --control-pressed: rgba(255,255,255,.034);
    --control-stroke: rgba(255,255,255,.07);
    --control-stroke-bottom: rgba(255,255,255,.10);
    --divider: rgba(255,255,255,.083);
    --subtle-hover: rgba(255,255,255,.061);
    --subtle-pressed: rgba(255,255,255,.034);
    --keycap-bg: rgba(255,255,255,.09);
    --keycap-stroke: rgba(255,255,255,.16);
    --keycap-shadow: 0 1px 0 rgba(0,0,0,.30);
    --smoke: rgba(0,0,0,.45);
    --track: rgba(255,255,255,.55);
    --success: #6ccb6c; --success-bg: rgba(57,61,27,.5); --success-stroke: rgba(108,203,108,.18);
    --warning: #fce100; --warning-bg: rgba(67,53,25,.5); --warning-stroke: rgba(252,225,0,.14);
    --error: #ff99a4;   --error-bg: rgba(68,39,38,.6);   --error-stroke: rgba(255,153,164,.16);
    --info-bg: rgba(255,255,255,.045); --info-stroke: rgba(255,255,255,.06);
  }

  /* ============ WINDOW ============ */
  .amp-window {
    width: 480px;
    max-height: calc(100vh - 48px);
    border-radius: var(--radius-lg);
    background: var(--mica);
    box-shadow: 0 0 0 1px var(--win-edge), 0 24px 60px rgba(0,0,0,.32), 0 4px 12px rgba(0,0,0,.16);
    overflow: hidden;
    color: var(--text-1);
    display: flex; flex-direction: column;
    position: relative;
    animation: winIn .45s var(--ease) both;
  }
  .amp-root[data-theme="light"] { --win-edge: rgba(0,0,0,.10); --scroll-thumb: rgba(0,0,0,.18); --scroll-thumb-hover: rgba(0,0,0,.32); }
  .amp-root[data-theme="dark"]  { --win-edge: rgba(255,255,255,.09); --scroll-thumb: rgba(255,255,255,.20); --scroll-thumb-hover: rgba(255,255,255,.34); }
  @keyframes winIn { from { transform: translateY(10px) scale(.99); } to { transform: none; } }

  .titlebar {
    height: 40px; flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
    padding-left: 14px;
    background: var(--mica-titlebar);
    user-select: none;
  }
  .titlebar .tb-title { font-size: 12px; color: var(--text-2); font-weight: 400; letter-spacing: .1px; }
  .caption-btns { margin-left: auto; display: flex; height: 100%; }
  .cap-btn {
    width: 46px; height: 100%; border: 0; background: transparent; cursor: default;
    display: grid; place-items: center; color: var(--text-1);
    transition: background .12s;
  }
  .cap-btn:hover { background: var(--subtle-hover); }
  .cap-btn.close:hover { background: #c42b1c; color: #fff; }

  .amp-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; }
  .amp-scroll::-webkit-scrollbar { width: 14px; }
  .amp-scroll::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border: 5px solid transparent; background-clip: padding-box; border-radius: 8px; }
  .amp-scroll:hover::-webkit-scrollbar-thumb { background: var(--scroll-thumb-hover); background-clip: padding-box; }
  .amp-content { padding: 4px 24px 24px; }

  /* ============ TYPE RAMP ============ */
  .t-caption { font-size: 12px; line-height: 16px; color: var(--text-2); }
  .t-body    { font-size: 14px; line-height: 20px; }
  .t-body-strong { font-size: 14px; line-height: 20px; font-weight: 600; }
  .t-bodylg  { font-size: 18px; line-height: 24px; font-weight: 600; }
  .t-subtitle{ font-size: 20px; line-height: 26px; font-weight: 600; font-family: var(--font-display); }
  .t-title   { font-size: 28px; line-height: 34px; font-weight: 600; font-family: var(--font-display); letter-spacing: -.2px; }
  .t-2 { color: var(--text-2); }
  .t-3 { color: var(--text-3); }
  .accent-text { color: var(--accent-text); }

  /* ============ CARD ============ */
  .amp-card {
    background: var(--card);
    border: 1px solid var(--card-stroke);
    border-radius: var(--radius-lg);
  }
  .amp-list { background: var(--card); border: 1px solid var(--card-stroke); border-radius: var(--radius-lg); overflow: hidden; }
  .amp-list-row { display: flex; align-items: center; gap: 14px; padding: 13px 16px; }
  .amp-list-row + .amp-list-row { border-top: 1px solid var(--divider); }
  .row-ico { width: 20px; display: grid; place-items: center; color: var(--text-1); flex-shrink: 0; }
  .row-main { flex: 1; min-width: 0; }
  .row-title { font-size: 14px; line-height: 18px; }
  .row-sub { font-size: 12px; line-height: 16px; color: var(--text-2); margin-top: 1px; }

  /* ============ BUTTONS ============ */
  .btn {
    font-family: var(--font); font-size: 14px; line-height: 20px; font-weight: 600;
    padding: 7px 18px; border-radius: var(--radius-sm);
    border: 1px solid var(--control-stroke); border-bottom-color: var(--control-stroke-bottom);
    background: var(--control); color: var(--text-1);
    cursor: default; transition: background .1s, border-color .1s, opacity .1s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: var(--control-hover); }
  .btn:active { background: var(--control-pressed); color: var(--text-2); border-bottom-color: var(--control-stroke); }
  .btn.accent {
    background: var(--accent-fill); color: var(--on-accent);
    border-color: var(--accent-edge); border-bottom-color: var(--accent-edge);
  }
  .btn.accent:hover { background: var(--accent-fill-hover); }
  .btn.accent:active { background: var(--accent-fill-pressed); color: var(--on-accent-dim); }
  .btn.subtle { background: transparent; border-color: transparent; border-bottom-color: transparent; font-weight: 400; }
  .btn.subtle:hover { background: var(--subtle-hover); }
  .btn.subtle:active { background: var(--subtle-pressed); }
  .btn.danger { color: var(--error); }
  .btn.danger:hover { background: var(--error-bg); border-color: var(--error-stroke); }
  .btn.block { width: 100%; }
  .btn.sm { padding: 4px 12px; font-size: 13px; }
  .btn:disabled { opacity: .42; pointer-events: none; }
  .btn .spin { animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 0; background: transparent; color: var(--text-1);
    display: grid; place-items: center; cursor: default; transition: background .1s;
  }
  .icon-btn:hover { background: var(--subtle-hover); }
  .icon-btn:active { background: var(--subtle-pressed); color: var(--text-2); }

  /* ============ INFO BAR ============ */
  .infobar { display: flex; gap: 12px; padding: 12px 14px; border-radius: var(--radius); border: 1px solid; align-items: flex-start; }
  .infobar .ib-ico { flex-shrink: 0; margin-top: 1px; }
  .infobar.success { background: var(--success-bg); border-color: var(--success-stroke); }
  .infobar.success .ib-ico { color: var(--success); }
  .infobar.warning { background: var(--warning-bg); border-color: var(--warning-stroke); }
  .infobar.warning .ib-ico { color: var(--warning); }
  .infobar.error { background: var(--error-bg); border-color: var(--error-stroke); }
  .infobar.error .ib-ico { color: var(--error); }
  .infobar.info { background: var(--info-bg); border-color: var(--info-stroke); }
  .infobar.info .ib-ico { color: var(--accent-text); }

  /* ============ KEYCAPS ============ */
  .keys { display: inline-flex; align-items: center; gap: 5px; }
  .keycap {
    min-width: 26px; height: 26px; padding: 0 7px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; line-height: 1;
    background: var(--keycap-bg); color: var(--text-1);
    border: 1px solid var(--keycap-stroke); border-radius: 5px;
    box-shadow: var(--keycap-shadow);
  }
  .keys .plus { font-size: 11px; color: var(--text-3); }
  .listening .keycap { animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

  /* ============ TOGGLE SWITCH ============ */
  .toggle { width: 40px; height: 20px; border-radius: 10px; position: relative; cursor: default; flex-shrink: 0;
    border: 1px solid var(--toggle-stroke); background: var(--toggle-bg); transition: background .15s, border-color .15s; }
  .amp-root[data-theme="light"] { --toggle-bg: rgba(0,0,0,.024); --toggle-stroke: rgba(0,0,0,.45); --toggle-knob: rgba(0,0,0,.65); }
  .amp-root[data-theme="dark"]  { --toggle-bg: rgba(255,255,255,.034); --toggle-stroke: rgba(255,255,255,.55); --toggle-knob: rgba(255,255,255,.78); }
  .toggle .knob { position: absolute; top: 50%; left: 3px; width: 12px; height: 12px; border-radius: 50%;
    background: var(--toggle-knob); transform: translateY(-50%); transition: left .18s var(--ease), width .12s, background .15s; }
  .toggle:hover .knob { width: 14px; }
  .toggle.on { background: var(--accent-fill); border-color: var(--accent-fill); }
  .toggle.on .knob { left: 23px; background: var(--on-accent); }
  .toggle:hover.on .knob { left: 21px; }

  /* ============ SLIDER ============ */
  .slider { position: relative; height: 32px; display: flex; align-items: center; cursor: default; flex: 1; }
  .slider .track { position: absolute; left: 0; right: 0; height: 4px; border-radius: 2px; background: var(--track); opacity: .55; }
  .slider .fill { position: absolute; left: 0; height: 4px; border-radius: 2px; background: var(--accent-fill); }
  .slider .thumb { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: var(--accent-fill);
    border: 4px solid var(--thumb-ring); box-shadow: 0 0 0 1px var(--card-stroke), 0 2px 4px rgba(0,0,0,.18); transform: translateX(-50%);
    transition: border-width .1s; }
  .amp-root[data-theme="light"] { --thumb-ring: #fff; }
  .amp-root[data-theme="dark"]  { --thumb-ring: #454545; }
  .slider:hover .thumb { border-width: 3px; }
  .slider:active .thumb { border-width: 5px; }

  /* ============ COMBO / SELECT ============ */
  .combo { position: relative; }
  .combo-btn {
    display: flex; align-items: center; gap: 8px; min-width: 130px;
    padding: 6px 10px 6px 12px; font-size: 14px;
    background: var(--control); color: var(--text-1);
    border: 1px solid var(--control-stroke); border-bottom-color: var(--control-stroke-bottom);
    border-radius: var(--radius-sm); cursor: default;
  }
  .combo-btn:hover { background: var(--control-hover); }
  .combo-btn .cv { flex: 1; text-align: left; }
  .combo-menu {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 40;
    background: var(--flyout);
    border: 1px solid var(--card-stroke); border-radius: var(--radius); box-shadow: var(--shadow-flyout);
    padding: 4px; animation: flyIn .14s var(--ease) both;
  }
  .amp-root[data-theme="light"] { --flyout: rgba(249,249,249,.92); }
  .amp-root[data-theme="dark"]  { --flyout: rgba(44,44,44,.92); }
  @keyframes flyIn { from { opacity: .01; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .combo-opt { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 14px; cursor: default; }
  .combo-opt:hover { background: var(--subtle-hover); }
  .combo-opt .chk { margin-left: auto; color: var(--accent-text); opacity: 0; }
  .combo-opt.sel .chk { opacity: 1; }

  /* ============ DIALOG ============ */
  .dialog-scrim { position: absolute; inset: 0; background: var(--smoke); z-index: 60; display: grid; place-items: center; padding: 24px; }
  .dialog {
    width: 100%; max-width: 360px; background: var(--dialog-bg);
    border: 1px solid var(--card-stroke); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-dialog); overflow: hidden; animation: dlgIn .24s var(--ease) both;
  }
  .amp-root[data-theme="light"] { --dialog-bg: #f9f9f9; }
  .amp-root[data-theme="dark"]  { --dialog-bg: #2c2c2c; }
  @keyframes dlgIn { from { transform: scale(1.05); } to { transform: none; } }
  .dialog-body { padding: 22px 24px 8px; }
  .dialog-foot { display: flex; gap: 8px; padding: 18px 24px 24px; }
  .dialog-foot .btn { flex: 1; }

  /* fade between screens */
  .screen { animation: scrIn .28s var(--ease) both; }
  @keyframes scrIn { from { transform: translateY(7px); } to { transform: none; } }

  .divider-h { height: 1px; background: var(--divider); border: 0; margin: 0; }

  .amp-link { color: var(--accent-text); text-decoration: none; cursor: default; }
  .amp-link:hover { text-decoration: underline; }

  /* text input */
  .amp-input { width: 100%; font-family: var(--font); font-size: 14px; line-height: 20px;
    padding: 7px 11px; color: var(--text-1); background: var(--control);
    border: 1px solid var(--control-stroke); border-bottom-color: var(--control-stroke-bottom);
    border-radius: var(--radius-sm); outline: none; transition: background .1s, border-color .1s; }
  .amp-input::placeholder { color: var(--text-3); }
  .amp-input:hover { background: var(--control-hover); }
  .amp-input:focus { background: var(--card); border-color: var(--control-stroke);
    border-bottom: 2px solid var(--accent-fill); padding-bottom: 6px; }
  .amp-input:disabled { opacity: .5; }

  /* copy field */
  .copy-field { display: flex; align-items: center; gap: 4px; background: var(--control);
    border: 1px solid var(--control-stroke); border-bottom-color: var(--control-stroke-bottom);
    border-radius: var(--radius-sm); padding: 4px 4px 4px 11px; }
  .copy-field code { flex: 1; min-width: 0; font-family: "Cascadia Mono","Consolas",ui-monospace,monospace;
    font-size: 12.5px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .copy-btn { width: 28px; height: 26px; border: 0; background: transparent; color: var(--text-1);
    border-radius: var(--radius-sm); display: grid; place-items: center; cursor: default; transition: background .1s; flex-shrink: 0; }
  .copy-btn:hover { background: var(--subtle-hover); }
  .copy-btn:active { background: var(--subtle-pressed); color: var(--text-2); }

  /* read-only field (disabled look) */
  .readonly-field { font-family: "Cascadia Mono","Consolas",ui-monospace,monospace; font-size: 12.5px;
    color: var(--text-disabled); background: var(--control-pressed);
    border: 1px solid var(--control-stroke); border-radius: var(--radius-sm);
    padding: 7px 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: none; cursor: default; }

  /* setup steps */
  .setup-steps { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px; }
  .setup-steps li { display: grid; grid-template-columns: 22px 1fr; gap: 12px; align-items: start; }
  .sx-num { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center;
    font-size: 11px; font-weight: 600; background: var(--accent-soft); color: var(--accent-text); border: 1px solid var(--accent-edge); }
  .sx-text { font-size: 13px; line-height: 19px; color: var(--text-2); padding-top: 1px; }
  .sx-text b, .sx-text strong { color: var(--text-1); font-weight: 600; }

  /* step badge */
  .step-num { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    background: var(--accent-soft); color: var(--accent-text); border: 1px solid var(--accent-edge); }
  .step-num.done { background: var(--accent-fill); color: var(--on-accent); border-color: var(--accent-fill); }
</style>
</head>
